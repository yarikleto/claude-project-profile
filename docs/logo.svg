<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Folder icon with profile switch arrows -->
  <g transform="translate(16, 20)">
    <!-- Folder back -->
    <rect x="0" y="16" width="72" height="56" rx="6" fill="#1E293B"/>
    <!-- Folder tab -->
    <path d="M0 22 Q0 16 6 16 H24 L30 8 Q32 4 36 4 H66 Q72 4 72 10 V16 H0 Z" fill="#334155"/>
    <!-- Dot grid (profile slots) -->
    <circle cx="22" cy="40" r="4" fill="#D97706"/>
    <circle cx="36" cy="40" r="4" fill="#475569"/>
    <circle cx="50" cy="40" r="4" fill="#475569"/>
    <!-- Switch arrows -->
    <path d="M18 56 L26 52 L26 60 Z" fill="#F59E0B" opacity="0.9"/>
    <path d="M54 56 L46 52 L46 60 Z" fill="#F59E0B" opacity="0.9"/>
    <line x1="26" y1="56" x2="46" y2="56" stroke="#F59E0B" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Text -->
  <text x="104" y="54" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="32" font-weight="700" fill="#E2E8F0">claude-project-profile</text>
  <text x="104" y="82" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="14" fill="#94A3B8">Switch project-level Claude Code profiles</text>
</svg>
